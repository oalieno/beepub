services:
  backend:
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - books_data:/data/books
      - covers_data:/data/covers
    environment:
      DEV: "1"

  worker:
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - books_data:/data/books
      - covers_data:/data/covers
    command: >
      sh -c "uv sync --frozen --no-install-project && exec uv run --with watchfiles watchfiles --filter python 'celery -A app.celeryapp:celery worker --loglevel=info --concurrency=2' /app/app"

  beat:
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: >
      sh -c "uv sync --frozen --no-install-project && exec uv run celery -A app.celeryapp:celery beat --loglevel=info"

  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CI: "true"
    command: >
      sh -c "corepack enable && pnpm install && exec pnpm run dev --host 0.0.0.0 --port 3000"

volumes:
  backend_venv:
  frontend_node_modules:
