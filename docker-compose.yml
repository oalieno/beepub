services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beepub}
      POSTGRES_USER: ${POSTGRES_USER:-beepub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beepub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beepub}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-beepub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      BOOKS_DIR: ${BOOKS_DIR:-/data/books}
      COVERS_DIR: ${COVERS_DIR:-/data/covers}
      ILLUSTRATIONS_DIR: ${ILLUSTRATIONS_DIR:-/data/illustrations}
    volumes:
      - books_data:/data/books
      - covers_data:/data/covers
      - illustrations_data:/data/illustrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    mem_limit: 4g
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "app.celeryapp:celery",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "--max-tasks-per-child=50",
        "--max-memory-per-child=1500000",
      ]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beepub}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-beepub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      BOOKS_DIR: ${BOOKS_DIR:-/data/books}
      COVERS_DIR: ${COVERS_DIR:-/data/covers}
      ILLUSTRATIONS_DIR: ${ILLUSTRATIONS_DIR:-/data/illustrations}
    volumes:
      - books_data:/data/books
      - covers_data:/data/covers
      - illustrations_data:/data/illustrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    restart: unless-stopped
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "app.celeryapp:celery",
        "beat",
        "--loglevel=info",
      ]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beepub}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-beepub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      ORIGIN: http://localhost:${PORT:-80}
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - covers_data:/data/covers:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  books_data:
  covers_data:
  illustrations_data:
